<!DOCTYPE html>
<html data-theme="light">
<head>
    <title>Gmail API Web App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-white: #ffffff;
            --bg-light-gray: #f1f3f4;
            --bg-blue: rgb(214,226,251);
            --border-gray: #ddd;
            --text-dark: #333;
            --text-gray: #5f6368;
            --accent-red: #d93025;
            --bg-sidebar: #f1f3f4;
            --bg-hover: #e8eaed;
            --modal-overlay: rgba(0,0,0,0.5);
        }
        
        [data-theme="dark"] {
            --bg-white: #202124;
            --bg-light-gray: #303134;
            --bg-blue: #3c4043;
            --border-gray: #5f6368;
            --text-dark: #e8eaed;
            --text-gray: #9aa0a6;
            --accent-red: #f28b82;
            --bg-sidebar: #202124;
            --bg-hover: #3c4043;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            color: var(--text-dark); 
            background-color: var(--bg-white); 
            transition: background-color 0.3s, color 0.3s;
        }
        
        #sidebar { 
            width: 250px; 
            background: var(--bg-sidebar); 
            padding: 10px 0; 
            border-right: 1px solid var(--border-gray); 
            display: flex;
            flex-direction: column;
        }
        
        #compose-area { padding: 10px 20px; margin-bottom: 10px; }
        .compose-btn { 
            width: 100%;
            padding: 12px; 
            background: var(--bg-blue); 
            color: var(--text-dark); 
            border: none; 
            border-radius: 24px; 
            cursor: pointer; 
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 1px 2px 0 rgba(0,0,0,0.302), 0 1px 3px 1px rgba(0,0,0,0.149);
            transition: box-shadow .2s ease, background-color 0.2s;
        }
        .compose-btn:hover { box-shadow: 0 4px 4px 0 rgba(0,0,0,0.302), 0 1px 3px 1px rgba(0,0,0,0.149); }

        .mailbox-item { 
            padding: 10px 20px 10px 30px; 
            cursor: pointer; 
            display: flex; 
            align-items: center;
            font-size: 14px;
            border-top-right-radius: 20px;
            border-bottom-right-radius: 20px;
            margin-right: 10px;
        }
        .mailbox-item:hover { background: var(--bg-hover); }
        .mailbox-item.active { background: var(--bg-blue); font-weight: bold; }
        
        .disclosure-triangle {
            margin-right: 10px;
            cursor: pointer;
            width: 12px;
            display: inline-block;
            transition: transform 0.2s;
            visibility: hidden; /* Default hidden, shown via JS if setting/accounts allow */
        }
        .disclosure-triangle.visible { visibility: visible; }
        .disclosure-triangle.expanded { transform: rotate(90deg); }
        
        .account-subset { display: none; padding-left: 40px; }
        .account-subset.visible { display: block; }
        .account-subset-item { padding: 5px 10px; font-size: 12px; cursor: pointer; color: var(--text-gray); }
        .account-subset-item:hover { text-decoration: underline; }

        #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        #header { 
            height: 64px; 
            padding: 0 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            border-bottom: 1px solid var(--border-gray);
        }
        #header h2 { margin: 0; font-size: 20px; font-weight: normal; }
        
        #settings-trigger { 
            font-size: 24px; 
            cursor: pointer; 
            padding: 8px; 
            border-radius: 50%; 
            color: var(--text-gray);
        }
        #settings-trigger:hover { background: var(--bg-hover); }

        #content { flex: 1; display: flex; position: relative; overflow: hidden; }

        #message-list-container { flex: 1; overflow-y: auto; border-right: 1px solid var(--border-gray); }
        #message-list { width: 100%; }

        #message-detail-panel { 
            width: 0; 
            overflow: hidden; 
            transition: width 0.3s ease; 
            background: var(--bg-white);
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border-gray);
        }
        #message-detail-panel.open { width: 60%; }
        #message-detail-panel.single-view { width: 100%; border-left: none; }

        .message-item { 
            padding: 10px 20px; 
            border-bottom: 1px solid var(--border-gray); 
            cursor: pointer; 
            display: flex;
            align-items: baseline;
            background: var(--bg-white);
        }
        .message-item:hover { 
            background: var(--bg-hover); 
        }
        .message-item.selected {
            background: var(--bg-blue);
        }
        .message-sender { width: 200px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .message-snippet { flex: 1; color: var(--text-gray); font-size: 0.9em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .detail-header { padding: 20px; border-bottom: 1px solid var(--border-gray); position: sticky; top: 0; background: var(--bg-white); z-index: 10; }
        .detail-subject { font-size: 22px; margin-bottom: 15px; }
        .detail-meta { display: flex; align-items: center; justify-content: space-between; font-size: 14px; color: var(--text-gray); }
        .detail-body-container { flex: 1; overflow-y: auto; padding: 20px; }
        .detail-body { line-height: 1.6; white-space: pre-wrap; font-family: sans-serif; }
        #detail-html-frame { width: 100%; height: 100%; border: none; }
        
        .panel-actions { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .back-btn { 
            cursor: pointer; padding: 8px 12px; border-radius: 50%; color: var(--text-gray); font-size: 18px;
        }
        .back-btn:hover { background: var(--bg-hover); }

        .composer-overlay { 
            position: fixed; bottom: 0; right: 50px; width: 500px; 
            background: var(--bg-white); border-top-left-radius: 8px; border-top-right-radius: 8px;
            box-shadow: 0 8px 10px 1px rgba(0,0,0,0.14), 0 3px 14px 2px rgba(0,0,0,0.12), 0 5px 5px -3px rgba(0,0,0,0.2);
            display: none; flex-direction: column; z-index: 100;
        }
        .composer-header { background: #404040; color: #fff; padding: 10px 15px; border-top-left-radius: 8px; border-top-right-radius: 8px; display: flex; justify-content: space-between; }
        .composer-body { padding: 15px; flex: 1; display: flex; flex-direction: column; }
        .form-group { margin-bottom: 15px; border-bottom: 1px solid var(--border-gray); }
        .form-group label { display: block; font-size: 12px; color: var(--text-gray); margin-bottom: 5px; }
        .form-group input, .form-group select { border: none; width: 100%; padding: 8px 0; outline: none; background: transparent; color: var(--text-dark); }
        .form-group textarea { border: none; width: 100%; padding: 8px 0; outline: none; resize: none; flex: 1; min-height: 200px; background: transparent; color: var(--text-dark); }
        
        /* Modal Styles */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--modal-overlay); display: none; align-items: center; justify-content: center; z-index: 200;
        }
        .modal-container {
            background: var(--bg-white); width: 800px; height: 600px; border-radius: 8px;
            display: flex; flex-direction: column; box-shadow: 0 24px 38px 3px rgba(0,0,0,0.14), 0 9px 46px 8px rgba(0,0,0,0.12), 0 11px 15px -7px rgba(0,0,0,0.2);
        }
        .modal-header { padding: 20px; border-bottom: 1px solid var(--border-gray); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { flex: 1; display: flex; overflow: hidden; }
        
        .modal-tabs { width: 200px; border-right: 1px solid var(--border-gray); padding: 10px 0; }
        .modal-tab { padding: 10px 20px; cursor: pointer; color: var(--text-gray); }
        .modal-tab:hover { background: var(--bg-hover); }
        .modal-tab.active { color: var(--accent-red); font-weight: bold; background: var(--bg-hover); }
        
        .modal-content { flex: 1; padding: 20px; overflow-y: auto; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .account-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid var(--border-gray); }
        .account-row:last-child { border-bottom: none; }
        .remove-btn { color: var(--accent-red); cursor: pointer; background: none; border: none; font-size: 14px; }
        
        .env-badge { background: #e8f0fe; color: #1967d2; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 10px; }

        #first-run-prompt {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); display: none; align-items: center; justify-content: center; z-index: 200;
        }
        .prompt-card { background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 1px 2px 0 rgba(60,64,67,0.302), 0 1px 3px 1px rgba(60,64,67,0.149); text-align: center; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div id="compose-area">
            <button class="compose-btn" onclick="showComposer()">+ Compose</button>
        </div>
        <div id="mailbox-list">
            <div class="mailbox-item active" onclick="loadMailbox('INBOX')">
                <span class="disclosure-triangle" onclick="toggleDisclosure(event, 'INBOX')">▶</span>
                <i class="fa-solid fa-inbox" style="margin-right: 8px;"></i> Inbox
            </div>
            <div id="accounts-INBOX" class="account-subset"></div>
            
            <div class="mailbox-item" onclick="loadMailbox('SENT')">
                <span class="disclosure-triangle" onclick="toggleDisclosure(event, 'SENT')">▶</span>
                <i class="fa-solid fa-paper-plane" style="margin-right: 8px;"></i> Sent
            </div>
            <div id="accounts-SENT" class="account-subset"></div>

            <div class="mailbox-item" onclick="loadMailbox('STARRED')">
                <span class="disclosure-triangle" onclick="toggleDisclosure(event, 'STARRED')">▶</span>
                <i class="fa-solid fa-star" style="margin-right: 8px;"></i> Starred
            </div>
            <div id="accounts-STARRED" class="account-subset"></div>

            <div class="mailbox-item" onclick="loadMailbox('DRAFT')">
                <span class="disclosure-triangle" onclick="toggleDisclosure(event, 'DRAFT')">▶</span>
                <i class="fa-solid fa-file-lines" style="margin-right: 8px;"></i> Drafts
            </div>
            <div id="accounts-DRAFT" class="account-subset"></div>

            <div class="mailbox-item" onclick="loadMailbox('TRASH')">
                <span class="disclosure-triangle" onclick="toggleDisclosure(event, 'TRASH')">▶</span>
                <i class="fa-solid fa-trash" style="margin-right: 8px;"></i> Trash
            </div>
            <div id="accounts-TRASH" class="account-subset"></div>

            <div class="mailbox-item" onclick="loadMailbox('')">
                <span class="disclosure-triangle" onclick="toggleDisclosure(event, 'ALL')">▶</span>
                <i class="fa-solid fa-envelope-open-text" style="margin-right: 8px;"></i> All Mail
            </div>
            <div id="accounts-ALL" class="account-subset"></div>
        </div>
    </div>
    <div id="main">
        <div id="header">
            <h2 id="view-name">Inbox</h2>
            <div id="search-container" style="flex: 1; margin: 0 20px; max-width: 720px; position: relative; display: flex; align-items: center;">
                <div style="position: relative; flex: 1;">
                    <i class="fa-solid fa-magnifying-glass" style="position: absolute; left: 15px; top: 12px; color: var(--text-gray);"></i>
                    <input type="text" id="search-input" placeholder="Search mail" style="width: 100%; padding: 10px 10px 10px 45px; border: none; border-radius: 8px; background: var(--bg-light-gray); outline: none; color: var(--text-dark);" onkeydown="if(event.key === 'Enter') performSearch()">
                </div>
            </div>
            <div id="settings-trigger" onclick="openSettings()"><i class="fa-solid fa-gear"></i></div>
        </div>
        <div id="content">
            <div id="message-list-container">
                <div id="message-list">
                    <!-- Messages will be loaded here -->
                </div>
                <div style="text-align: center; padding: 20px;">
                    <button id="load-more-btn" class="compose-btn" style="width: auto; padding: 10px 30px; display: none;" onclick="loadMore()">Load More</button>
                </div>
            </div>
            
            <div id="message-detail-panel">
                <!-- Message details will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h3>Settings</h3>
                <span style="cursor: pointer;" onclick="closeSettings()">✖</span>
            </div>
            <div class="modal-body">
                <div class="modal-tabs">
                    <div class="modal-tab active" onclick="switchTab('general')" data-tab="general">General</div>
                    <div class="modal-tab" onclick="switchTab('accounts')" data-tab="accounts">Accounts</div>
                    <div class="modal-tab" onclick="switchTab('appearance')" data-tab="appearance">Appearance</div>
                </div>
                <div class="modal-content">
                    <!-- General Tab -->
                    <div id="tab-general" class="tab-panel active">
                        <h4>Google API Configuration</h4>
                        <div class="form-group">
                            <label>Google Client ID <span id="client-id-env-badge" class="env-badge" style="display:none">Set via .env</span></label>
                            <input type="text" id="client-id" placeholder="Client ID">
                        </div>
                        <div class="form-group">
                            <label>Google Client Secret <span id="client-secret-env-badge" class="env-badge" style="display:none">Set via .env</span></label>
                            <input type="password" id="client-secret" placeholder="Client Secret">
                        </div>
                        <div id="credentials-feedback" style="margin-bottom: 20px; font-size: 13px;"></div>
                        <button class="compose-btn" id="save-settings-btn" style="width: auto; padding: 10px 20px;" onclick="updateSettings()">Save General Settings</button>
                    </div>

                    <!-- Accounts Tab -->
                    <div id="tab-accounts" class="tab-panel">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                            <h4>Connected Accounts</h4>
                            <button class="compose-btn" style="width: auto; padding: 8px 15px;" onclick="addAccount()">Add Account</button>
                        </div>
                        <div id="accounts-list-settings">
                            <!-- Accounts listed here -->
                        </div>
                    </div>

                    <!-- Appearance Tab -->
                    <div id="tab-appearance" class="tab-panel">
                        <h4>Theme</h4>
                        <div class="form-group" style="border: none;">
                            <select id="setting-theme" onchange="updateAppearance()">
                                <option value="light">Light</option>
                                <option value="dark">Dark</option>
                                <option value="automatic">Automatic (System Default)</option>
                            </select>
                        </div>
                        
                        <h4 style="margin-top: 30px;">Sidebar</h4>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <input type="checkbox" id="setting-disclosure" style="width: auto;" onchange="updateAppearance()">
                            <label for="setting-disclosure">Show disclosure triangles for single account</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="composer" class="composer-overlay">
        <div class="composer-header">
            <span>New Message</span>
            <span style="cursor: pointer;" onclick="hideComposer()">✖</span>
        </div>
        <div class="composer-body">
            <div class="form-group">
                <select id="compose-from"></select>
            </div>
            <div class="form-group">
                <input type="text" id="compose-to" placeholder="To">
            </div>
            <div class="form-group">
                <input type="text" id="compose-subject" placeholder="Subject">
            </div>
            <div class="form-group">
                <textarea id="compose-body" placeholder="Body"></textarea>
            </div>
            <button class="compose-btn" style="width: 100px; align-self: flex-start;" onclick="sendEmail()">Send</button>
        </div>
    </div>

    <div id="first-run-prompt">
        <div class="prompt-card">
            <h2>Welcome to Gmail App</h2>
            <p>Please configure your Google API credentials and add an account to get started.</p>
            <button class="compose-btn" onclick="openSettings(); document.getElementById('first-run-prompt').style.display='none'">Go to Settings</button>
        </div>
    </div>

    <script>
        let currentLabel = 'INBOX';
        let currentAccountId = null; // null means unified
        let accounts = [];
        let nextPageToken = null;
        let globalSettings = {};

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const messageId = urlParams.get('messageId');
            const accountId = urlParams.get('accountId');

            if (messageId && accountId) {
                // Single-message view mode
                document.getElementById('sidebar').style.display = 'none';
                document.getElementById('header').style.display = 'none';
                document.getElementById('message-list-container').style.display = 'none';
                const panel = document.getElementById('message-detail-panel');
                panel.classList.add('open', 'single-view');

                await loadSettings();
                await loadAccounts();
                showMessage(messageId, accountId, true);
                return;
            }

            await loadSettings();
            await loadAccounts();
            if (accounts.length === 0) {
                document.getElementById('first-run-prompt').style.display = 'flex';
            } else {
                loadMailbox('INBOX');
            }
        }

        async function loadSettings() {
            const res = await fetch('/settings');
            globalSettings = await res.json();
            
            // Populate General Settings
            document.getElementById('client-id').value = globalSettings.GOOGLE_CLIENT_ID || '';
            document.getElementById('client-secret').value = globalSettings.GOOGLE_CLIENT_SECRET || '';
            
            if (globalSettings.is_client_id_env) {
                document.getElementById('client-id').disabled = true;
                document.getElementById('client-id-env-badge').style.display = 'inline-block';
            }
            if (globalSettings.is_client_secret_env) {
                document.getElementById('client-secret').disabled = true;
                document.getElementById('client-secret-env-badge').style.display = 'inline-block';
            }
            
            const feedback = document.getElementById('credentials-feedback');
            if (globalSettings.is_client_id_env || globalSettings.is_client_secret_env) {
                feedback.innerText = "Some settings are locked because they are provided via environment variables.";
                feedback.style.color = "var(--text-gray)";
            } else if (globalSettings.GOOGLE_CLIENT_ID && globalSettings.GOOGLE_CLIENT_SECRET) {
                feedback.innerText = "Credentials are configured and stored in the database.";
                feedback.style.color = "green";
            } else {
                feedback.innerText = "Credentials are not yet configured.";
                feedback.style.color = "var(--accent-red)";
            }

            // Populate Appearance Settings
            document.getElementById('setting-theme').value = globalSettings.THEME || 'automatic';
            document.getElementById('setting-disclosure').checked = globalSettings.SHOW_DISCLOSURE_IF_SINGLE === 'true';
            
            applyTheme(globalSettings.THEME);
        }

        async function updateSettings() {
            const data = {
                GOOGLE_CLIENT_ID: document.getElementById('client-id').value,
                GOOGLE_CLIENT_SECRET: document.getElementById('client-secret').value
            };
            await fetch('/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            alert('General settings saved');
            loadSettings();
        }

        async function updateAppearance() {
            const theme = document.getElementById('setting-theme').value;
            const disclosure = document.getElementById('setting-disclosure').checked;
            
            await fetch('/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    THEME: theme,
                    SHOW_DISCLOSURE_IF_SINGLE: disclosure ? 'true' : 'false'
                })
            });
            
            applyTheme(theme);
            loadSettings();
            updateDisclosureTriangles();
        }

        function applyTheme(theme) {
            if (theme === 'automatic') {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
            } else {
                document.documentElement.setAttribute('data-theme', theme);
            }
        }

        async function loadAccounts() {
            const res = await fetch('/accounts');
            accounts = await res.json();
            
            const select = document.getElementById('compose-from');
            select.innerHTML = '';
            accounts.forEach(acc => {
                const opt = document.createElement('option');
                opt.value = acc.id;
                opt.innerText = acc.email;
                select.appendChild(opt);
            });
            
            // Populate account subsets in sidebar
            ['INBOX', 'SENT', 'STARRED', 'DRAFT', 'TRASH', 'ALL'].forEach(label => {
                const subset = document.getElementById(`accounts-${label}`);
                if (!subset) return;
                subset.innerHTML = '';
                accounts.forEach(acc => {
                    const item = document.createElement('div');
                    item.className = 'account-subset-item';
                    item.innerText = acc.email;
                    item.onclick = (e) => {
                        e.stopPropagation();
                        loadAccountMailbox(acc.id, acc.email, label === 'ALL' ? '' : label);
                    };
                    subset.appendChild(item);
                });
            });

            updateDisclosureTriangles();
            renderAccountsInSettings();
        }

        function updateDisclosureTriangles() {
            const showAlways = document.getElementById('setting-disclosure').checked;
            const shouldShow = showAlways || accounts.length > 1;
            
            document.querySelectorAll('.disclosure-triangle').forEach(t => {
                if (shouldShow) {
                    t.classList.add('visible');
                } else {
                    t.classList.remove('visible');
                }
            });
        }

        function renderAccountsInSettings() {
            const list = document.getElementById('accounts-list-settings');
            list.innerHTML = '';
            accounts.forEach(acc => {
                const row = document.createElement('div');
                row.className = 'account-row';
                row.innerHTML = `
                    <span>${acc.email}</span>
                    <button class="remove-btn" onclick="removeAccount(${acc.id}, '${acc.email}')">Remove</button>
                `;
                list.appendChild(row);
            });
        }

        async function removeAccount(id, email) {
            if (!confirm(`Are you sure you want to remove ${email}?`)) return;
            
            const res = await fetch(`/accounts/${id}`, { method: 'DELETE' });
            if (res.ok) {
                await loadAccounts();
                if (currentAccountId === id) {
                    loadMailbox('INBOX');
                }
            } else {
                alert("Failed to remove account");
            }
        }

        function openSettings() {
            document.getElementById('settings-modal').style.display = 'flex';
            loadSettings();
            renderAccountsInSettings();
        }

        function closeSettings() {
            document.getElementById('settings-modal').style.display = 'none';
        }

        function switchTab(tab) {
            document.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            
            document.querySelector(`.modal-tab[data-tab="${tab}"]`).classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
        }

        function toggleDisclosure(event, label) {
            event.stopPropagation();
            const triangle = event.target;
            const subset = document.getElementById(`accounts-${label}`);
            if (subset) {
                triangle.classList.toggle('expanded');
                subset.classList.toggle('visible');
            }
        }

        async function loadMailbox(label, append = false) {
            if (!append) {
                currentLabel = label;
                currentAccountId = null;
                nextPageToken = null;
                document.getElementById('message-list').innerHTML = '';
                document.getElementById('view-name').innerText = label === '' ? 'All Mail' : label.charAt(0) + label.slice(1).toLowerCase();
                document.getElementById('search-input').value = '';
                hideMessageDetail();
                
                // Update active state in sidebar
                document.querySelectorAll('.mailbox-item').forEach(item => {
                    item.classList.remove('active');
                    const targetLabel = label === '' ? 'All Mail' : label;
                    if (item.innerText.toUpperCase().includes(targetLabel.toUpperCase())) {
                        item.classList.add('active');
                    }
                });
            }

            let url = `/unified/messages?`;
            if (label) url += `label=${label}&`;
            if (append && nextPageToken) url += `page_token=${nextPageToken}&`;
            
            const res = await fetch(url);
            const data = await res.json();
            nextPageToken = data.nextPageToken || null;
            
            document.getElementById('load-more-btn').style.display = nextPageToken ? 'inline-block' : 'none';
            renderMessages(data.messages, append);
        }

        async function loadAccountMailbox(accId, email, label, append = false) {
            if (!append) {
                currentLabel = label;
                currentAccountId = accId;
                nextPageToken = null;
                document.getElementById('message-list').innerHTML = '';
                document.getElementById('view-name').innerText = `${email} - ${label === '' ? 'All Mail' : label}`;
                document.getElementById('search-input').value = '';
                hideMessageDetail();
            }
            
            let url = `/accounts/${accId}/messages?`;
            if (label) url += `label=${label}&`;
            if (append && nextPageToken) url += `page_token=${nextPageToken}&`;
            
            const res = await fetch(url);
            const data = await res.json();
            nextPageToken = data.nextPageToken || null;

            document.getElementById('load-more-btn').style.display = nextPageToken ? 'inline-block' : 'none';
            renderMessages(data.messages, append);
        }

        function loadMore() {
            if (currentLabel === 'SEARCH') {
                performSearch(true);
            } else if (currentAccountId === null) {
                loadMailbox(currentLabel, true);
            } else {
                const email = accounts.find(a => a.id === currentAccountId)?.email || '';
                loadAccountMailbox(currentAccountId, email, currentLabel, true);
            }
        }

        async function performSearch(append = false) {
            const query = document.getElementById('search-input').value;
            if (!query && !append) return;

            if (!append) {
                currentLabel = 'SEARCH';
                nextPageToken = null;
                document.getElementById('message-list').innerHTML = '<div style="padding: 20px; text-align: center;">Searching...</div>';
                document.getElementById('view-name').innerText = `Search: ${query}`;
                hideMessageDetail();
                
                // Remove active state from sidebar
                document.querySelectorAll('.mailbox-item').forEach(item => item.classList.remove('active'));
            }

            // For search, we use the currently active account OR the first account
            let accId = currentAccountId || (accounts.length > 0 ? accounts[0].id : null);
            if (!accId) {
                alert("Please add an account first");
                return;
            }

            try {
                let url = `/accounts/${accId}/search?q=${encodeURIComponent(query)}&max_results=20`;
                if (append && nextPageToken) url += `&page_token=${nextPageToken}`;
                
                const res = await fetch(url);
                if (!res.ok) {
                    const error = await res.json();
                    alert("Search error: " + (error.detail || res.statusText));
                    document.getElementById('message-list').innerHTML = '';
                    return;
                }
                const data = await res.json();
                nextPageToken = data.nextPageToken || null;
                
                document.getElementById('load-more-btn').style.display = nextPageToken ? 'inline-block' : 'none';
                renderMessages(data.messages, append);
            } catch (err) {
                console.error(err);
                alert("An error occurred during search");
            }
        }

        function renderMessages(messages, append = false) {
            const list = document.getElementById('message-list');
            if (!append) {
                list.innerHTML = '';
            }
            if (!messages || messages.length === 0) {
                if (!append) list.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-gray);">No messages found.</div>';
                return;
            }
            
            messages.forEach(msg => {
                const item = document.createElement('div');
                item.className = 'message-item';
                item.id = `msg-${msg.id}`;
                item.innerHTML = `
                    <div class="message-sender">${msg.from || msg.accountEmail || ''}</div>
                    <div class="message-snippet"><b>${msg.subject || '(no subject)'}</b> - ${msg.snippet}</div>
                    <div class="message-date">${new Date(msg.internalDate).toLocaleDateString()}</div>
                `;
                item.onclick = () => showMessage(msg.id, msg.accountId || msg.account_id || currentAccountId);
                item.ondblclick = () => openMessageInNewWindow(msg.id, msg.accountId || msg.account_id || currentAccountId);
                list.appendChild(item);
            });
        }

        async function showMessage(id, accId, isSingleView = false) {
            if (!accId) {
                accId = accounts[0].id;
            }
            
            // Highlight selected
            document.querySelectorAll('.message-item').forEach(item => item.classList.remove('selected'));
            const selectedItem = document.getElementById(`msg-${id}`);
            if (selectedItem) selectedItem.classList.add('selected');

            const panel = document.getElementById('message-detail-panel');
            panel.classList.add('open');
            if (isSingleView) panel.classList.add('single-view');
            panel.innerHTML = '<div style="padding: 20px; text-align: center;">Loading message...</div>';

            try {
                const res = await fetch(`/accounts/${accId}/messages/${id}`);
                const msg = await res.json();
                
                panel.innerHTML = `
                    <div class="detail-header">
                        <div class="panel-actions">
                            ${isSingleView ? '' : '<span class="back-btn" onclick="hideMessageDetail()"><i class="fa-solid fa-xmark"></i></span>'}
                        </div>
                        <div class="detail-subject">${msg.subject || '(no subject)'}</div>
                        <div class="detail-meta">
                            <div><strong>${msg.from || ''}</strong></div>
                            <div>${new Date(msg.internalDate).toLocaleString()}</div>
                        </div>
                    </div>
                    <div class="detail-body-container">
                        ${msg.html_body ? 
                            '<iframe id="detail-html-frame"></iframe>' : 
                            `<div class="detail-body">${msg.body || msg.snippet || ''}</div>`
                        }
                    </div>
                `;

                if (msg.html_body) {
                    const iframe = document.getElementById('detail-html-frame');
                    const doc = iframe.contentDocument || iframe.contentWindow.document;
                    doc.open();
                    doc.write(msg.html_body);
                    doc.close();
                    
                    // Adjust iframe height to content
                    iframe.onload = function() {
                        iframe.style.height = doc.body.scrollHeight + 'px';
                    };
                }
            } catch (err) {
                panel.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--accent-red);">Failed to load message.</div>';
            }
        }

        function openMessageInNewWindow(id, accId) {
            if (!accId) accId = accounts[0].id;
            const url = `?messageId=${id}&accountId=${accId}`;
            window.open(url, '_blank', 'width=800,height=600');
        }
                        iframe.style.height = doc.body.scrollHeight + 'px';
                    };
                }
            } catch (err) {
                panel.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--accent-red);">Failed to load message.</div>';
            }
        }

        function hideMessageDetail() {
            const panel = document.getElementById('message-detail-panel');
            panel.classList.remove('open');
            document.querySelectorAll('.message-item').forEach(item => item.classList.remove('selected'));
        }

        function showComposer() {
            document.getElementById('composer').style.display = 'flex';
        }

        function hideComposer() {
            document.getElementById('composer').style.display = 'none';
        }

        async function sendEmail() {
            const accId = document.getElementById('compose-from').value;
            const data = {
                to: document.getElementById('compose-to').value,
                subject: document.getElementById('compose-subject').value,
                body: document.getElementById('compose-body').value
            };
            const res = await fetch(`/accounts/${accId}/send`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            alert(result.message);
            hideComposer();
        }

        function addAccount() {
            location.href = '/auth/login';
        }

        // Listen for system theme changes if set to automatic
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if (globalSettings.THEME === 'automatic') {
                applyTheme('automatic');
            }
        });

        init();
    </script>
</body>
</html>
