<!DOCTYPE html>
<html>
<head>
    <title>Gmail API Web App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-white: #ffffff;
            --bg-light-gray: #f1f3f4;
            --bg-blue: rgb(214,226,251);
            --border-gray: #ddd;
            --text-dark: #333;
            --text-gray: #5f6368;
            --accent-red: #d93025;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; color: var(--text-dark); background-color: var(--bg-white); }
        
        #sidebar { 
            width: 250px; 
            background: var(--bg-light-gray); 
            padding: 10px 0; 
            border-right: 1px solid var(--border-gray); 
            display: flex;
            flex-direction: column;
        }
        
        #compose-area { padding: 10px 20px; margin-bottom: 10px; }
        .compose-btn { 
            width: 100%;
            padding: 12px; 
            background: var(--bg-blue); 
            color: var(--text-dark); 
            border: none; 
            border-radius: 24px; 
            cursor: pointer; 
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.302), 0 1px 3px 1px rgba(60,64,67,0.149);
            transition: box-shadow .2s ease;
        }
        .compose-btn:hover { box-shadow: 0 4px 4px 0 rgba(60,64,67,0.302), 0 1px 3px 1px rgba(60,64,67,0.149); }

        .mailbox-item { 
            padding: 10px 20px 10px 30px; 
            cursor: pointer; 
            display: flex; 
            align-items: center;
            font-size: 14px;
            border-top-right-radius: 20px;
            border-bottom-right-radius: 20px;
            margin-right: 10px;
        }
        .mailbox-item:hover { background: #e8eaed; }
        .mailbox-item.active { background: var(--bg-blue); font-weight: bold; }
        
        .disclosure-triangle {
            margin-right: 10px;
            cursor: pointer;
            width: 12px;
            display: inline-block;
            transition: transform 0.2s;
        }
        .disclosure-triangle.expanded { transform: rotate(90deg); }
        
        .account-subset { display: none; padding-left: 40px; }
        .account-subset.visible { display: block; }
        .account-subset-item { padding: 5px 10px; font-size: 12px; cursor: pointer; color: var(--text-gray); }
        .account-subset-item:hover { text-decoration: underline; }

        #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        #header { 
            height: 64px; 
            padding: 0 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            border-bottom: 1px solid var(--border-gray);
        }
        #header h2 { margin: 0; font-size: 20px; font-weight: normal; }
        
        #settings-trigger { 
            font-size: 24px; 
            cursor: pointer; 
            padding: 8px; 
            border-radius: 50%; 
            color: var(--text-gray);
        }
        #settings-trigger:hover { background: var(--bg-light-gray); }

        #content { flex: 1; overflow-y: auto; padding: 0; }

        .message-item { 
            padding: 10px 20px; 
            border-bottom: 1px solid #eee; 
            cursor: pointer; 
            display: flex;
            align-items: baseline;
            background: var(--bg-white);
        }
        .message-item:hover { 
            background: #f8f9fa; 
            box-shadow: inset 1px 0 0 #dadce0, inset -1px 0 0 #dadce0, 0 1px 2px 0 rgba(60,64,67,.3), 0 1px 3px 1px rgba(60,64,67,.15);
            z-index: 1;
        }
        .message-sender { width: 200px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .message-snippet { flex: 1; color: var(--text-gray); font-size: 0.9em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .message-date { width: 100px; text-align: right; color: var(--text-gray); font-size: 0.85em; }

        .composer-overlay { 
            position: fixed; bottom: 0; right: 50px; width: 500px; 
            background: #fff; border-top-left-radius: 8px; border-top-right-radius: 8px;
            box-shadow: 0 8px 10px 1px rgba(0,0,0,0.14), 0 3px 14px 2px rgba(0,0,0,0.12), 0 5px 5px -3px rgba(0,0,0,0.2);
            display: none; flex-direction: column; z-index: 100;
        }
        .composer-header { background: #404040; color: #fff; padding: 10px 15px; border-top-left-radius: 8px; border-top-right-radius: 8px; display: flex; justify-content: space-between; }
        .composer-body { padding: 15px; flex: 1; display: flex; flex-direction: column; }
        .form-group { margin-bottom: 10px; border-bottom: 1px solid #eee; }
        .form-group input, .form-group select { border: none; width: 100%; padding: 8px 0; outline: none; }
        .form-group textarea { border: none; width: 100%; padding: 8px 0; outline: none; resize: none; flex: 1; min-height: 200px; }
        
        #settings-panel {
            position: fixed; top: 64px; right: 20px; width: 300px;
            background: #fff; border: 1px solid var(--border-gray); border-radius: 8px;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.302), 0 1px 3px 1px rgba(60,64,67,0.149);
            padding: 20px; display: none; z-index: 90;
        }

        #first-run-prompt {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); display: none; align-items: center; justify-content: center; z-index: 200;
        }
        .prompt-card { background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 1px 2px 0 rgba(60,64,67,0.302), 0 1px 3px 1px rgba(60,64,67,0.149); text-align: center; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div id="compose-area">
            <button class="compose-btn" onclick="showComposer()">+ Compose</button>
        </div>
        <div id="mailbox-list">
            <div class="mailbox-item active" onclick="loadMailbox('INBOX')">
                <span class="disclosure-triangle" onclick="toggleDisclosure(event, 'INBOX')">▶</span>
                <i class="fa-solid fa-inbox" style="margin-right: 8px;"></i> Inbox
            </div>
            <div id="accounts-INBOX" class="account-subset"></div>
            
            <div class="mailbox-item" onclick="loadMailbox('SENT')">
                <span class="disclosure-triangle" onclick="toggleDisclosure(event, 'SENT')">▶</span>
                <i class="fa-solid fa-paper-plane" style="margin-right: 8px;"></i> Sent
            </div>
            <div id="accounts-SENT" class="account-subset"></div>

            <div class="mailbox-item" onclick="loadMailbox('STARRED')">
                <span class="disclosure-triangle" onclick="toggleDisclosure(event, 'STARRED')">▶</span>
                <i class="fa-solid fa-star" style="margin-right: 8px;"></i> Starred
            </div>
            <div id="accounts-STARRED" class="account-subset"></div>

            <div class="mailbox-item" onclick="loadMailbox('DRAFT')">
                <span class="disclosure-triangle" onclick="toggleDisclosure(event, 'DRAFT')">▶</span>
                <i class="fa-solid fa-file-lines" style="margin-right: 8px;"></i> Drafts
            </div>
            <div id="accounts-DRAFT" class="account-subset"></div>

            <div class="mailbox-item" onclick="loadMailbox('TRASH')">
                <span class="disclosure-triangle" onclick="toggleDisclosure(event, 'TRASH')">▶</span>
                <i class="fa-solid fa-trash" style="margin-right: 8px;"></i> Trash
            </div>
            <div id="accounts-TRASH" class="account-subset"></div>

            <div class="mailbox-item" onclick="loadMailbox('')">
                <span class="disclosure-triangle" onclick="toggleDisclosure(event, 'ALL')">▶</span>
                <i class="fa-solid fa-envelope-open-text" style="margin-right: 8px;"></i> All Mail
            </div>
            <div id="accounts-ALL" class="account-subset"></div>
        </div>
    </div>
    <div id="main">
        <div id="header">
            <h2 id="view-name">Inbox</h2>
            <div id="search-container" style="flex: 1; margin: 0 20px; max-width: 720px; position: relative; display: flex; align-items: center;">
                <div style="position: relative; flex: 1;">
                    <i class="fa-solid fa-magnifying-glass" style="position: absolute; left: 15px; top: 12px; color: var(--text-gray);"></i>
                    <input type="text" id="search-input" placeholder="Search mail" style="width: 100%; padding: 10px 10px 10px 45px; border: none; border-radius: 8px; background: var(--bg-light-gray); outline: none;" onkeydown="if(event.key === 'Enter') performSearch()">
                </div>
                <button id="search-filters-btn" onclick="toggleSearchFilters()" style="background: none; border: none; margin-left: -40px; cursor: pointer; color: var(--text-gray); z-index: 5;">
                    <i class="fa-solid fa-sliders"></i>
                </button>
                <div id="search-filters-panel" style="position: absolute; top: 50px; left: 0; right: 0; background: #fff; border: 1px solid var(--border-gray); border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 20px; display: none; z-index: 100;">
                    <div class="form-group" style="display: flex; align-items: center; margin-bottom: 10px;">
                        <label style="width: 80px; font-size: 14px;">From</label>
                        <input type="text" id="filter-from" style="flex: 1; border-bottom: 1px solid #eee;">
                    </div>
                    <div class="form-group" style="display: flex; align-items: center; margin-bottom: 10px;">
                        <label style="width: 80px; font-size: 14px;">To</label>
                        <input type="text" id="filter-to" style="flex: 1; border-bottom: 1px solid #eee;">
                    </div>
                    <div class="form-group" style="display: flex; align-items: center; margin-bottom: 10px;">
                        <label style="width: 80px; font-size: 14px;">Subject</label>
                        <input type="text" id="filter-subject" style="flex: 1; border-bottom: 1px solid #eee;">
                    </div>
                    <div class="form-group" style="display: flex; align-items: center; margin-bottom: 10px;">
                        <label style="width: 80px; font-size: 14px;">Has words</label>
                        <input type="text" id="filter-has" style="flex: 1; border-bottom: 1px solid #eee;">
                    </div>
                    <div style="display: flex; justify-content: flex-end; gap: 10px;">
                        <button class="compose-btn" style="width: auto; background: var(--bg-light-gray); box-shadow: none;" onclick="resetSearchFilters()">Reset</button>
                        <button class="compose-btn" style="width: auto;" onclick="applySearchFilters()">Search</button>
                    </div>
                </div>
            </div>
            <div id="settings-trigger" onclick="toggleSettings()"><i class="fa-solid fa-gear"></i></div>
        </div>
        <div id="content">
            <div id="message-list">
                <!-- Messages will be loaded here -->
            </div>
            <div style="text-align: center; padding: 20px;">
                <button id="load-more-btn" class="compose-btn" style="width: auto; padding: 10px 30px; display: none;" onclick="loadMore()">Load More</button>
            </div>
        </div>
    </div>

    <div id="settings-panel">
        <h3>Settings</h3>
        <div class="form-group">
            <label>Google Client ID</label>
            <input type="text" id="client-id" placeholder="Client ID">
        </div>
        <div class="form-group">
            <label>Google Client Secret</label>
            <input type="password" id="client-secret" placeholder="Client Secret">
        </div>
        <button class="compose-btn" style="background: var(--bg-light-gray); border: 1px solid var(--border-gray); margin-bottom: 10px;" onclick="updateSettings()">Save Settings</button>
        <button class="compose-btn" onclick="addAccount()">Add Account</button>
    </div>

    <div id="composer" class="composer-overlay">
        <div class="composer-header">
            <span>New Message</span>
            <span style="cursor: pointer;" onclick="hideComposer()">✖</span>
        </div>
        <div class="composer-body">
            <div class="form-group">
                <select id="compose-from"></select>
            </div>
            <div class="form-group">
                <input type="text" id="compose-to" placeholder="To">
            </div>
            <div class="form-group">
                <input type="text" id="compose-subject" placeholder="Subject">
            </div>
            <div class="form-group">
                <textarea id="compose-body" placeholder="Body"></textarea>
            </div>
            <button class="compose-btn" style="width: 100px; align-self: flex-start;" onclick="sendEmail()">Send</button>
        </div>
    </div>

    <div id="first-run-prompt">
        <div class="prompt-card">
            <h2>Welcome to Gmail App</h2>
            <p>Please configure your Google API credentials and add an account to get started.</p>
            <button class="compose-btn" onclick="toggleSettings(); document.getElementById('first-run-prompt').style.display='none'">Go to Settings</button>
        </div>
    </div>

    <script>
        let currentLabel = 'INBOX';
        let currentAccountId = null; // null means unified
        let accounts = [];
        let nextPageToken = null;

        async function init() {
            await loadAccounts();
            if (accounts.length === 0) {
                document.getElementById('first-run-prompt').style.display = 'flex';
            } else {
                loadMailbox('INBOX');
            }
        }

        async function loadAccounts() {
            const res = await fetch('/accounts');
            accounts = await res.json();
            
            const select = document.getElementById('compose-from');
            select.innerHTML = '';
            accounts.forEach(acc => {
                const opt = document.createElement('option');
                opt.value = acc.id;
                opt.innerText = acc.email;
                select.appendChild(opt);
            });
            
            // Populate account subsets in sidebar
            ['INBOX', 'SENT', 'STARRED', 'DRAFT', 'TRASH', 'ALL'].forEach(label => {
                const subset = document.getElementById(`accounts-${label}`);
                if (!subset) return;
                subset.innerHTML = '';
                accounts.forEach(acc => {
                    const item = document.createElement('div');
                    item.className = 'account-subset-item';
                    item.innerText = acc.email;
                    item.onclick = (e) => {
                        e.stopPropagation();
                        loadAccountMailbox(acc.id, acc.email, label === 'ALL' ? '' : label);
                    };
                    subset.appendChild(item);
                });
            });
        }

        function toggleDisclosure(event, label) {
            event.stopPropagation();
            const triangle = event.target;
            const subset = document.getElementById(`accounts-${label}`);
            if (subset) {
                triangle.classList.toggle('expanded');
                subset.classList.toggle('visible');
            }
        }

        async function toggleSettings() {
            const panel = document.getElementById('settings-panel');
            if (panel.style.display === 'none' || panel.style.display === '') {
                panel.style.display = 'block';
                const res = await fetch('/settings');
                const settings = await res.json();
                document.getElementById('client-id').value = settings.GOOGLE_CLIENT_ID || '';
                document.getElementById('client-secret').value = settings.GOOGLE_CLIENT_SECRET || '';
            } else {
                panel.style.display = 'none';
            }
        }

        async function loadMailbox(label, append = false) {
            if (!append) {
                currentLabel = label;
                currentAccountId = null;
                nextPageToken = null;
                document.getElementById('message-list').innerHTML = '';
                document.getElementById('view-name').innerText = label === '' ? 'All Mail' : label.charAt(0) + label.slice(1).toLowerCase();
                document.getElementById('search-input').value = '';
                
                // Update active state in sidebar
                document.querySelectorAll('.mailbox-item').forEach(item => {
                    item.classList.remove('active');
                    const targetLabel = label === '' ? 'All Mail' : label;
                    if (item.innerText.toUpperCase().includes(targetLabel.toUpperCase())) {
                        item.classList.add('active');
                    }
                });
            }

            let url = `/unified/messages?`;
            if (label) url += `label=${label}&`;
            if (append && nextPageToken) url += `page_token=${nextPageToken}&`;
            
            const res = await fetch(url);
            const data = await res.json();
            nextPageToken = data.nextPageToken || null;
            
            document.getElementById('load-more-btn').style.display = nextPageToken ? 'inline-block' : 'none';
            renderMessages(data.messages, append);
        }

        async function loadAccountMailbox(accId, email, label, append = false) {
            if (!append) {
                currentLabel = label;
                currentAccountId = accId;
                nextPageToken = null;
                document.getElementById('message-list').innerHTML = '';
                document.getElementById('view-name').innerText = `${email} - ${label === '' ? 'All Mail' : label}`;
                document.getElementById('search-input').value = '';
            }
            
            let url = `/accounts/${accId}/messages?`;
            if (label) url += `label=${label}&`;
            if (append && nextPageToken) url += `page_token=${nextPageToken}&`;
            
            const res = await fetch(url);
            const data = await res.json();
            nextPageToken = data.nextPageToken || null;

            document.getElementById('load-more-btn').style.display = nextPageToken ? 'inline-block' : 'none';
            renderMessages(data.messages, append);
        }

        function loadMore() {
            if (currentLabel === 'SEARCH') {
                performSearch(true);
            } else if (currentAccountId === null) {
                loadMailbox(currentLabel, true);
            } else {
                const email = accounts.find(a => a.id === currentAccountId)?.email || '';
                loadAccountMailbox(currentAccountId, email, currentLabel, true);
            }
        }

        function toggleSearchFilters() {
            const panel = document.getElementById('search-filters-panel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        }

        function resetSearchFilters() {
            document.getElementById('filter-from').value = '';
            document.getElementById('filter-to').value = '';
            document.getElementById('filter-subject').value = '';
            document.getElementById('filter-has').value = '';
        }

        function applySearchFilters() {
            const from = document.getElementById('filter-from').value;
            const to = document.getElementById('filter-to').value;
            const subject = document.getElementById('filter-subject').value;
            const has = document.getElementById('filter-has').value;
            
            let query = '';
            if (from) query += `from:(${from}) `;
            if (to) query += `to:(${to}) `;
            if (subject) query += `subject:(${subject}) `;
            if (has) query += has;
            
            document.getElementById('search-input').value = query.trim();
            document.getElementById('search-filters-panel').style.display = 'none';
            performSearch();
        }

        async function performSearch(append = false) {
            const query = document.getElementById('search-input').value;
            if (!query && !append) return;

            if (!append) {
                currentLabel = 'SEARCH';
                nextPageToken = null;
                document.getElementById('message-list').innerHTML = '<div style="padding: 20px; text-align: center;">Searching...</div>';
                document.getElementById('view-name').innerText = `Search: ${query}`;
                
                // Remove active state from sidebar
                document.querySelectorAll('.mailbox-item').forEach(item => item.classList.remove('active'));
            }

            // For search, we use the currently active account OR the first account
            let accId = currentAccountId || (accounts.length > 0 ? accounts[0].id : null);
            if (!accId) {
                alert("Please add an account first");
                return;
            }

            try {
                let url = `/accounts/${accId}/search?q=${encodeURIComponent(query)}&max_results=20`;
                if (append && nextPageToken) url += `&page_token=${nextPageToken}`;
                
                const res = await fetch(url);
                if (!res.ok) {
                    const error = await res.json();
                    alert("Search error: " + (error.detail || res.statusText));
                    document.getElementById('message-list').innerHTML = '';
                    return;
                }
                const data = await res.json();
                nextPageToken = data.nextPageToken || null;
                
                document.getElementById('load-more-btn').style.display = nextPageToken ? 'inline-block' : 'none';
                renderMessages(data.messages, append);
            } catch (err) {
                console.error(err);
                alert("An error occurred during search");
            }
        }

        function renderMessages(messages, append = false) {
            const list = document.getElementById('message-list');
            if (!append) {
                list.innerHTML = '';
            }
            if (!messages || messages.length === 0) {
                if (!append) list.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-gray);">No messages found.</div>';
                return;
            }
            
            messages.forEach(msg => {
                const item = document.createElement('div');
                item.className = 'message-item';
                item.innerHTML = `
                    <div class="message-sender">${msg.from || msg.accountEmail || ''}</div>
                    <div class="message-snippet"><b>${msg.subject || '(no subject)'}</b> - ${msg.snippet}</div>
                    <div class="message-date">${new Date(msg.internalDate).toLocaleDateString()}</div>
                `;
                item.onclick = () => showMessage(msg.id, msg.accountId || currentAccountId);
                list.appendChild(item);
            });
        }

        async function showMessage(id, accId) {
            const res = await fetch(`/accounts/${accId}/messages/${id}`);
            const msg = await res.json();
            alert(JSON.stringify(msg, null, 2));
        }

        function showComposer() {
            document.getElementById('composer').style.display = 'flex';
        }

        function hideComposer() {
            document.getElementById('composer').style.display = 'none';
        }

        async function sendEmail() {
            const accId = document.getElementById('compose-from').value;
            const data = {
                to: document.getElementById('compose-to').value,
                subject: document.getElementById('compose-subject').value,
                body: document.getElementById('compose-body').value
            };
            const res = await fetch(`/accounts/${accId}/send`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            alert(result.message);
            hideComposer();
        }

        function addAccount() {
            location.href = '/auth/login';
        }

        async function updateSettings() {
            const clientId = document.getElementById('client-id').value;
            const clientSecret = document.getElementById('client-secret').value;
            await fetch('/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    GOOGLE_CLIENT_ID: clientId,
                    GOOGLE_CLIENT_SECRET: clientSecret
                })
            });
            alert('Settings saved');
        }

        init();
    </script>
</body>
</html>
